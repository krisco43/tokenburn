<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TokenBurn | AI Agent Cost Estimator</title>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        [x-cloak] { display: none !important; }
        * { font-family: "Inter", sans-serif !important; box-sizing: border-box; }
        
        body { 
            background-color: #050505; 
            color: #ffffff; 
            margin: 0; 
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .container { max-width: 1100px; width: 100%; }
        header { text-align: center; margin-bottom: 50px; }
        
        h1 { 
            font-size: clamp(2.5rem, 8vw, 4rem); 
            margin: 0; 
            font-weight: 700; 
            letter-spacing: -3px; 
            text-transform: uppercase; 
            line-height: 0.9; 
        }

        .yellow { color: #fbbf24; }
        .green { color: #a3e635; }

        .main-grid { display: grid; grid-template-columns: 1fr; gap: 30px; align-items: start; }
        @media (min-width: 900px) { .main-grid { grid-template-columns: 1.8fr 1.2fr; } }

        .card { 
            background: #0f0f0f; 
            border: 1px solid #1a2e1a; 
            padding: 30px; 
            border-radius: 12px;
            display: flex;
            flex-direction: column;
        }

        .result-card { 
            background: #000; 
            border: 2px solid #a3e635; 
            text-align: center; 
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(163, 230, 53, 0.1);
        }

        .input-group { margin-bottom: 30px; }
        .input-group:last-child { margin-bottom: 0; }

        label { 
            display: block; 
            font-size: 11px; 
            font-weight: 700; 
            color: #a3e635; 
            text-transform: uppercase; 
            margin-bottom: 15px; 
            letter-spacing: 0.1em; 
        }

        select { 
            width: 100%; 
            background: #111111; 
            color: #fbbf24; 
            border: 1px solid #1a2e1a; 
            padding: 16px; 
            border-radius: 8px; 
            font-size: 15px; 
            appearance: none; 
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23fbbf24' stroke-width='3'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); 
            background-repeat: no-repeat; 
            background-position: right 1.2rem center; 
            background-size: 1.1em; 
            cursor: pointer; 
        }

        select option { background: #141414; }
        select option:nth-child(odd) { color: #fbbf24; }
        select option:nth-child(even) { color: #ffffff; }

        input[type="range"] { 
            width: 100%; 
            height: 10px; 
            background: #1a1a1a; 
            border-radius: 10px; 
            outline: none; 
            margin-top: 15px;
            accent-color: #fbbf24; 
            cursor: pointer; 
        }

        .val-display { display: flex; justify-content: space-between; align-items: baseline; }
        .big-num { color: #fbbf24; font-size: 24px; font-weight: 700; }

        .complexity-toggle { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
        }

        .complexity-btn { 
            background: transparent; 
            color: #a3e635; 
            border: 1px solid rgba(163, 230, 53, 0.3); 
            padding: 22px 15px; 
            border-radius: 10px; 
            cursor: pointer; 
            text-align: left; 
        }

        .complexity-btn.active { background: #a3e635; color: #000; border-color: #a3e635; }
        .cx-label { display: block; font-size: 14px; font-weight: 800; text-transform: uppercase; }
        .cx-meta { display: block; font-size: 11px; margin-top: 4px; opacity: 0.8; }

        .total-price { font-size: 56px; font-weight: 800; margin: 20px 0; color: #FFFFFF; letter-spacing: -2px; }
        
        .copy-btn { 
            background: transparent; 
            color: #a3e635; 
            border: 2px solid #a3e635; 
            padding: 16px; 
            border-radius: 10px; 
            font-size: 12px; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer; 
            width: 100%;
        }

        /* SUPPORT DATA PANEL */
        .support-panel {
            margin-top: 40px;
            padding: 20px;
            border: 1px dashed #1a1a1a;
            border-radius: 8px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            background: rgba(15, 15, 15, 0.5);
        }

        .support-item { display: flex; flex-direction: column; gap: 4px; }
        .support-label { font-size: 10px; color: #444; text-transform: uppercase; font-weight: 800; }
        .support-value { font-size: 12px; color: #888; font-family: monospace; }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #a3e635; margin-right: 6px; }

        footer { 
            margin-top: 30px; 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-top: 1px solid #1a1a1a;
            padding-top: 25px;
            color: #333;
            font-size: 11px;
        }

        .footer-left { display: flex; gap: 24px; }
        footer a { color: #666; text-decoration: none; text-transform: uppercase; font-weight: 700; }
        footer a:hover { color: #fbbf24; }
    </style>
</head>

<body x-data="burnEngine()">
    <div class="container">
        <header>
            <h1>TOKEN<span class="yellow">BURN</span><span class="green">.ORG</span></h1>
        </header>

        <div class="main-grid">
            <div class="card">
                <div class="input-group">
                    <label>Intelligence Engine</label>
                    <select x-model="selectedModel">
                        <template x-for="m in modelList" :key="m.name">
                            <option :value="m.name" x-text="m.name + ' — $' + m.per1k.toFixed(4)"></option>
                        </template>
                    </select>
                </div>

                <div class="input-group">
                    <div class="val-display">
                        <label>Initial Prompt Context</label>
                        <span class="big-num" x-text="parseInt(inputTokens).toLocaleString()"></span>
                    </div>
                    <input type="range" min="1000" max="1000000" step="1000" x-model="inputTokens">
                </div>

                <div class="input-group">
                    <div class="val-display">
                        <label>Recursive Agent Loops</label>
                        <span class="big-num" x-text="loops"></span>
                    </div>
                    <input type="range" min="1" max="50" step="1" x-model="loops">
                </div>

                <div class="input-group">
                    <label>Task Complexity Profile</label>
                    <div class="complexity-toggle">
                        <button type="button" class="complexity-btn" :class="{ active: complexity === 'simple' }" @click="applyComplexity('simple')">
                            <span class="cx-label">[01] Simple</span>
                            <span class="cx-meta">5 loops // 10%</span>
                        </button>
                        <button type="button" class="complexity-btn" :class="{ active: complexity === 'feature' }" @click="applyComplexity('feature')">
                            <span class="cx-label">[02] Feature</span>
                            <span class="cx-meta">15 loops // 15%</span>
                        </button>
                        <button type="button" class="complexity-btn" :class="{ active: complexity === 'deep' }" @click="applyComplexity('deep')">
                            <span class="cx-label">[03] Deep</span>
                            <span class="cx-meta">30 loops // 20%</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="card result-card">
                <label>Estimated Session Burn</label>
                <div class="total-price" x-text="'$' + calculateTotal()"></div>
                <p style="font-size: 12px; color: #9ca3af; text-transform: uppercase;" x-text="selectedModel"></p>
                <button type="button" class="copy-btn" @click="copyResult()">Copy Quote Report</button>
            </div>
        </div>

        <div class="support-panel">
            <div class="support-item">
                <span class="support-label">Netlify Site ID</span>
                <span class="support-value">tb-prod-882-xf92</span>
            </div>
            <div class="support-item">
                <span class="support-label">Support Status</span>
                <span class="support-value"><span class="status-dot"></span>Active Premium</span>
            </div>
            <div class="support-item">
                <span class="support-label">Last Build</span>
                <span class="support-value">2026-04-24 23:45 UTC</span>
            </div>
        </div>

        <footer>
            <div class="footer-left">
                <a href="#">Terms of Use</a>
                <a href="#">Privacy Policy</a>
                <a href="#">Contact Support</a>
            </div>
            <div class="footer-right">
                &copy; 2026 TOKENBURN.ORG // PRIVATE BETA
            </div>
        </footer>
    </div>

    <script>
        function burnEngine() {
            return {
                inputTokens: 2000,
                loops: 30,
                complexity: 'deep',
                compoundingFactor: 0.20,
                selectedModel: 'GPT-5.5 Max',
                modelList: [
                    { name: 'DeepSeek V4-Flash',  per1k: 0.0001 },
                    { name: 'Llama 4-70B',        per1k: 0.00015 },
                    { name: 'DeepSeek V4-Pro',    per1k: 0.0017 },
                    { name: 'GPT-5.5 Mini',       per1k: 0.0025 },
                    { name: 'Claude 4.7 Sonnet',  per1k: 0.0030 },
                    { name: 'Gemini 2.0 Ultra',   per1k: 0.0125 },
                    { name: 'GPT-5.5 Max',        per1k: 0.0300 }
                ],
                applyComplexity(level) {
                    this.complexity = level;
                    if (level === 'simple')   { this.loops = 5;  this.compoundingFactor = 0.10; }
                    if (level === 'feature')  { this.loops = 15; this.compoundingFactor = 0.15; }
                    if (level === 'deep')     { this.loops = 30; this.compoundingFactor = 0.20; }
                },
                calculateTotal() {
                    const model = this.modelList.find(m => m.name === this.selectedModel);
                    const total = (this.inputTokens * Math.pow(1 + this.compoundingFactor, this.loops)) * (model.per1k / 1000);
                    return total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 4});
                },
                copyResult() { alert('Copied'); }
            }
        }
    </script>
</body>
</html>
