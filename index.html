<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZRXDSY5VND"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-ZRXDSY5VND');
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TokenBurn | AI Agent Cost Estimator</title>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        * { font-family: "Inter", sans-serif !important; box-sizing: border-box; }
        body { background: #000; color: #fff; margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { max-width: 1100px; width: 100%; }
        header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 900; letter-spacing: -3px; text-transform: uppercase; margin: 0; line-height: 0.9; }
        .yellow { color: #fbbf24; }
        .green { color: #a3e635; }
        .main-grid { display: grid; grid-template-columns: 1fr; gap: 30px; align-items: start; }
        @media (min-width: 900px) { .main-grid { grid-template-columns: 1.8fr 1.2fr; } }
        
        .card { background: #0d0d0d; border: 1px solid #333; padding: 30px; border-radius: 12px; }
        .result-card { background: #000; border: 2px solid #a3e635; padding: 35px 25px; border-radius: 12px; display: flex; flex-direction: column; text-align: center; transition: all 0.4s ease; position: relative; }
        
        .red-zone { border-color: #ff3333 !important; background: #2a0000 !important; animation: redPulse 2s infinite ease-in-out; }
        .red-zone .total-price, .red-zone .model-badge, .red-zone label { color: #ff3333 !important; }
        .red-zone .copy-btn { color: #ff3333 !important; border-color: #ff3333 !important; }

        @keyframes redPulse {
            0% { box-shadow: 0 0 0px rgba(255, 51, 51, 0); }
            50% { box-shadow: 0 0 40px rgba(255, 51, 51, 0.4); }
            100% { box-shadow: 0 0 0px rgba(255, 51, 51, 0); }
        }

        .total-price { font-size: 64px; font-weight: 800; margin: 10px 0; color: #fff; letter-spacing: -2px; }
        .model-badge { font-size: 15px; color: #a3e635; text-transform: uppercase; font-weight: 800; margin-bottom: 25px; }
        
        .btn-action { display: block; text-decoration: none; text-align: center; padding: 20px; border-radius: 10px; font-size: 14px; font-weight: 900; text-transform: uppercase; cursor: pointer; width: 100%; border: none; }
        .copy-btn { background: transparent; color: #a3e635; border: 2px solid #a3e635; margin-bottom: 12px; }
        .coffee-btn { background: #fbbf24; color: #000 !important; margin-bottom: 30px; }

        .support-meta-wrap { text-align: left; border-top: 1px solid #333; padding-top: 20px; }
        .support-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; }
        .support-key { color: #fff; text-transform: uppercase; font-weight: 800; opacity: 0.8; }
        .support-val { color: #fff; font-weight: 600; }
        
        .input-group { margin-bottom: 30px; }
        label { display: block; font-size: 13px; font-weight: 800; color: #a3e635; text-transform: uppercase; margin-bottom: 12px; }
        select { width: 100%; background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 18px; border-radius: 8px; font-size: 16px; appearance: none; cursor: pointer; }
        input[type="range"] { width: 100%; height: 12px; background: #333; accent-color: #fbbf24; cursor: pointer; margin-top: 10px; }
        .big-num { color: #fbbf24; font-size: 28px; font-weight: 800; }
        
        .comp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .comp-btn { 
            background: transparent; color: #fff; border: 1px solid #444; padding: 22px 10px; 
            border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 900; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .comp-btn.active { background: #a3e635; color: #000; border-color: #a3e635; }
        
        .btn-sub { font-size: 11px; opacity: 0.8; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; line-height: 1.4; text-align: center; }
        .comp-btn.active .btn-sub { opacity: 1; }

        footer { margin-top: 80px; display: flex; justify-content: space-between; border-top: 1px solid #333; padding: 40px 0; width: 100%; }
        .footer-links { display: flex; gap: 30px; }
        footer button { 
            background: none; border: none; color: #fff; 
            text-decoration: none; cursor: pointer; font-weight: 800; 
            text-transform: uppercase; font-size: 14px; padding: 0; transition: 0.2s;
        }
        footer button:hover { color: #fbbf24; }
        .copyright { color: #f0f0f0; font-weight: 700; font-size: 14px; letter-spacing: 0.5px; }
    </style>
</head>
<body x-data="burnEngine()">
    <div class="container" x-cloak>
        <header><h1>TOKEN<span class="yellow">BURN</span><span class="green">.ORG</span></h1></header>
        
        <div class="main-grid">
            <div class="card">
                <div class="input-group">
                    <label>Intelligence Engine</label>
                    <select x-model="selectedModel" @change="updateModelName($event); trackEvent('calculate_burn', 'model_change')">
                        <option value="0.0001">DeepSeek V4-Flash — $0.0001</option>
                        <option value="0.00015">Llama 4-70B — $0.00015</option>
                        <option value="0.0005">Grok-3 Mini — $0.0005</option>
                        <option value="0.0008">Claude 4.2 Haiku — $0.0008</option>
                        <option value="0.0025">GPT-5.5 Mini — $0.0025</option>
                        <option value="0.0035">DeepSeek V4-Pro — $0.0035</option>
                        <option value="0.0060">Claude 4.7 Sonnet — $0.0060</option>
                        <option value="0.0125">Gemini 2.5 Ultra — $0.0125</option>
                        <option value="0.0150">Claude 4.8 Opus — $0.0150</option>
                        <option value="0.0300" selected>GPT-5.5 Max — $0.0300</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <div style="display: flex; justify-content: space-between;"><label>Prompt Context</label><span class="big-num" x-text="parseInt(inputTokens).toLocaleString()"></span></div>
                    <input type="range" min="1000" max="1000000" step="1000" x-model="inputTokens" @change="trackEvent('calculate_burn', 'context_slider')">
                </div>
                
                <div class="input-group">
                    <div style="display: flex; justify-content: space-between;"><label>Agent Loops</label><span class="big-num" x-text="loops"></span></div>
                    <input type="range" min="1" max="50" x-model="loops" @change="trackEvent('calculate_burn', 'loop_slider')">
                </div>
                
                <div class="comp-grid">
                    <button class="comp-btn" :class="{active: complexity==='simple'}" @click="setComp('simple', 5, 0.1); trackEvent('calculate_burn', 'preset_simple')">
                        SIMPLE
                        <span class="btn-sub">Basic Chat<br>5 Loops</span>
                    </button>
                    <button class="comp-btn" :class="{active: complexity==='feat'}" @click="setComp('feat', 15, 0.15); trackEvent('calculate_burn', 'preset_feature')">
                        FEATURE
                        <span class="btn-sub">Task Execution<br>15 Loops</span>
                    </button>
                    <button class="comp-btn" :class="{active: complexity==='deep'}" @click="setComp('deep', 30, 0.2); trackEvent('calculate_burn', 'preset_deep')">
                        DEEP
                        <span class="btn-sub">Recursive RAG<br>30 Loops</span>
                    </button>
                </div>
            </div>
            
            <div class="result-card" :class="{'red-zone': (inputTokens * Math.pow(1 + factor, loops) * (parseFloat(selectedModel) / 1000)) >= 10}">
                <div>
                    <label>Estimated Session Burn</label>
                    <div class="total-price" x-text="'$' + calc()"></div>
                    <div class="model-badge" x-text="modelName"></div>
                </div>
                
                <button class="btn-action copy-btn" @click="copy(); trackEvent('quote_copied', modelName)">Copy Full Quote</button>
                <a href="https://buymeacoffee.com/tokenburn" target="_blank" class="btn-action coffee-btn" @click="trackEvent('coffee_click', 'sidebar')">☕ Buy Me a Coffee</a>

                <div class="support-meta-wrap">
                    <div class="support-row"><span class="support-key">Monthly Hosting</span><span class="support-val">$14.00</span></div>
                    <div class="support-row"><span class="support-key">API Maintenance</span><span class="support-val">$28.50</span></div>
                    <div class="support-row"><span class="support-key">Beta Status</span><span style="color:#fbbf24; font-weight:800;">OPEN ACCESS</span></div>
                </div>
            </div>
        </div>

        <footer>
            <div class="footer-links">
                <button @click="alert('Estimate only. Real burn depends on provider overhead.')">Terms</button>
                <button @click="alert('No data is collected or stored.')">Privacy</button>
            </div>
            <div class="copyright">&copy; 2026 TOKENBURN.ORG</div>
        </footer>
    </div>

    <script>
        function burnEngine() {
            return {
                inputTokens: 2000,
                loops: 30,
                complexity: 'deep',
                factor: 0.2,
                selectedModel: "0.0300",
                modelName: "GPT-5.5 Max",
                
                init() {
                    // Deep Engagement Tracker (2 Minutes)
                    setTimeout(() => {
                        this.trackEvent('deep_engagement', '2_minutes');
                    }, 120000);
                },

                trackEvent(name, label) {
                    if (typeof gtag === 'function') {
                        gtag('event', name, {
                            'event_label': label,
                            'model_context': this.modelName
                        });
                    }
                },

                updateModelName(e) {
                    this.modelName = e.target.options[e.target.selectedIndex].text.split(' — ')[0];
                },

                setComp(c, l, f) {
                    this.complexity = c;
                    this.loops = l;
                    this.factor = f;
                },

                calc() {
                    const price = parseFloat(this.selectedModel);
                    const total = (this.inputTokens * Math.pow(1 + this.factor, this.loops)) * (price / 1000);
                    return total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
                },

                copy() {
                    const text = `TokenBurn Estimate: $${this.calc()} using ${this.modelName}`;
                    navigator.clipboard.writeText(text);
                    alert('Quote Copied');
                }
            }
        }
    </script>
</body>
</html>
