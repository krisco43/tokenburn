<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TokenBurn | AI Agent Cost Estimator</title>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        * { font-family: "Inter", sans-serif !important; box-sizing: border-box; }
        body { background: #000; color: #fff; margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { max-width: 1100px; width: 100%; }
        header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 900; letter-spacing: -3px; text-transform: uppercase; margin: 0; line-height: 0.9; }
        .yellow { color: #fbbf24; }
        .green { color: #a3e635; }
        .main-grid { display: grid; grid-template-columns: 1fr; gap: 30px; align-items: start; }
        @media (min-width: 900px) { .main-grid { grid-template-columns: 1.8fr 1.2fr; } }
        .card { background: #0a0a0a; border: 1px solid #1a2e1a; padding: 30px; border-radius: 12px; }
        .result-card { background: #000; border: 2px solid #a3e635; text-align: center; padding: 35px 25px; border-radius: 12px; min-height: 400px; display: flex; flex-direction: column; }
        .input-group { margin-bottom: 30px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #a3e635; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.1em; }
        select { width: 100%; background: #111; color: #fbbf24; border: 1px solid #333; padding: 16px; border-radius: 8px; font-size: 15px; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23fbbf24' stroke-width='3'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 1.2rem center; background-size: 1.1em; }
        input[type="range"] { width: 100%; height: 10px; background: #222; accent-color: #fbbf24; cursor: pointer; margin-top: 15px; }
        .big-num { color: #fbbf24; font-size: 24px; font-weight: 700; }
        .complexity-btn { background: transparent; color: #a3e635; border: 1px solid #a3e63544; padding: 22px 10px; border-radius: 10px; cursor: pointer; text-align: left; }
        .complexity-btn.active { background: #a3e635; color: #000; border-color: #a3e635; }
        .total-price { font-size: 52px; font-weight: 800; margin: 15px 0; color: #fff; letter-spacing: -2px; }
        .support-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 12px; }
        .support-key { color: #AAA; text-transform: uppercase; font-weight: 800; }
        .btn-action { display: block; text-decoration: none; text-align: center; padding: 18px; border-radius: 10px; font-size: 13px; font-weight: 900; text-transform: uppercase; cursor: pointer; width: 100%; }
        .copy-btn { background: transparent; color: #a3e635; border: 2px solid #a3e635; margin-bottom: 20px; }
        .coffee-btn { background: #fbbf24; color: #000 !important; border: none; }
        footer { margin-top: 80px; display: flex; justify-content: space-between; border-top: 1px solid #333; padding: 40px 0; font-size: 12px; }
        footer button { background: none; border: none; color: #fff; text-decoration: underline; cursor: pointer; font-weight: 700; text-transform: uppercase; padding: 0; }
    </style>
</head>
<body x-data="burnEngine()">
    <div class="container">
        <header><h1>TOKEN<span class="yellow">BURN</span><span class="green">.ORG</span></h1></header>
        <div class="main-grid">
            <div class="card">
                <div class="input-group">
                    <label>Intelligence Engine</label>
                    <select x-model="selectedModel" @change="updateModelName($event)">
                        <option value="0.0001">DeepSeek V4-Flash — $0.0001</option>
                        <option value="0.00015">Llama 4-70B — $0.00015</option>
                        <option value="0.0005">Grok-3 Mini — $0.0005</option>
                        <option value="0.0008">Claude 4.2 Haiku — $0.0008</option>
                        <option value="0.0025">GPT-5.5 Mini — $0.0025</option>
                        <option value="0.0035">DeepSeek V4-Pro — $0.0035</option>
                        <option value="0.0060">Claude 4.7 Sonnet — $0.0060</option>
                        <option value="0.0125">Gemini 2.5 Ultra — $0.0125</option>
                        <option value="0.0150">Claude 4.8 Opus — $0.0150</option>
                        <option value="0.0300">GPT-5.5 Max — $0.0300</option>
                    </select>
                </div>
                <div class="input-group">
                    <div style="display: flex; justify-content: space-between;"><label>Prompt Context</label><span class="big-num" x-text="parseInt(inputTokens).toLocaleString()"></span></div>
                    <input type="range" min="1000" max="1000000" step="1000" x-model="inputTokens">
                </div>
                <div class="input-group">
                    <div style="display: flex; justify-content: space-between;"><label>Agent Loops</label><span class="big-num" x-text="loops"></span></div>
                    <input type="range" min="1" max="50" x-model="loops">
                </div>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
                    <button class="complexity-btn" :class="{active: complexity==='simple'}" @click="setComp('simple', 5, 0.1)">SIMPLE</button>
                    <button class="complexity-btn" :class="{active: complexity==='feat'}" @click="setComp('feat', 15, 0.15)">FEATURE</button>
                    <button class="complexity-btn" :class="{active: complexity==='deep'}" @click="setComp('deep', 30, 0.2)">DEEP</button>
                </div>
            </div>
            
            <div class="result-card">
                <div style="flex-grow: 1;">
                    <label>Estimated Session Burn</label>
                    <div class="total-price" x-text="'$' + calc()"></div>
                    <div style="font-size: 12px; color: #a3e635; text-transform: uppercase; font-weight: 800;" x-text="modelName"></div>
                </div>
                
                <div style="text-align: left; margin-bottom: 20px; border-top: 1px solid #222; padding-top: 20px;">
                    <div class="support-row"><span class="support-key">Monthly Hosting</span><span style="font-weight:600;">$14.00</span></div>
                    <div class="support-row"><span class="support-key">API Maintenance</span><span style="font-weight:600;">$28.50</span></div>
                    <div class="support-row"><span class="support-key">Beta Status</span><span style="color:#fbbf24; font-weight:600;">OPEN ACCESS</span></div>
                </div>
                
                <button class="btn-action copy-btn" @click="copy()">Copy Full Quote</button>
                <a href="https://buymeacoffee.com/tokenburn" target="_blank" class="btn-action coffee-btn">☕ Buy Me a Coffee</a>
            </div>
        </div>
        <footer>
            <div class="footer-links">
                <button @click="openModal('Terms', 'Private Beta. Estimation only.')">Terms</button>
                <button @click="openModal('Privacy', 'No data stored.')">Privacy</button>
            </div>
            <div style="color: #888;">&copy; 2026 TOKENBURN.ORG</div>
        </footer>
    </div>
    <div class="modal-overlay" x-show="modalOpen" x-cloak @click.self="modalOpen = false">
        <div class="modal-content"><h2 x-text="mTitle" class="green"></h2><p x-text="mText"></p></div>
    </div>
    <script>
        function burnEngine() {
            return {
                modalOpen: false, mTitle: '', mText: '', inputTokens: 2000, loops: 30, complexity: 'deep', factor: 0.2, selectedModel: "0.0300", modelName: "GPT-5.5 Max",
                updateModelName(e) { this.modelName = e.target.options[e.target.selectedIndex].text.split(' — ')[0]; },
                setComp(c, l, f) { this.complexity = c; this.loops = l; this.factor = f; },
                openModal(t, tx) { this.mTitle = t; this.mText = tx; this.modalOpen = true; },
                calc() {
                    const price = parseFloat(this.selectedModel);
                    const total = (this.inputTokens * Math.pow(1 + this.factor, this.loops)) * (price / 1000);
                    return total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
                },
                copy() { navigator.clipboard.writeText('Burn Estimate: $' + this.calc()); alert('Copied'); }
            }
        }
    </script>
</body>
</html>
